name: QA (Playwright)

# Corre el QA automatizado DESPUÉS de cada deploy de PRODUCCIÓN de Vercel
# (Vercel envía un `deployment_status` a GitHub al terminar). También se puede
# disparar a mano contra cualquier URL.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: URL a probar
        default: https://coachpro-livid.vercel.app
        required: false

permissions:
  contents: read

# Fuerza las actions JS (actions/*@v4) a correr en Node 24 y silencia el
# warning de deprecación de Node 20 en el runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  qa:
    # En cualquier deploy exitoso (producción O preview), o ejecución manual.
    # El QA prueba environment_url, que Vercel rellena tanto en prod como en preview.
    #
    # ── PENDIENTE DE CONFIGURAR (requiere acceso admin) ───────────────────────
    # Para que el QA pueda entrar a las URLs de preview protegidas por Vercel,
    # se necesita configurar el bypass secret en DOS lugares:
    #
    # 1. Vercel Dashboard → Project "coachpro" → Settings → Deployment Protection
    #    → activar "Protection Bypass for Automation" → copiar el secret generado
    #
    # 2. GitHub → repositorio omargc92/coachpro → Settings → Secrets and variables
    #    → Actions → New repository secret
    #    Nombre:  VERCEL_AUTOMATION_BYPASS_SECRET
    #    Valor:   (el secret copiado de Vercel en el paso anterior)
    #
    # Sin esto el QA seguirá fallando en PRs (pero la app en producción sigue bien).
    # ──────────────────────────────────────────────────────────────────────────
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Esperar a que el deploy esté servido
        run: sleep 8

      - name: Correr QA
        env:
          QA_BROWSER: chromium
          QA_URL: ${{ github.event.deployment_status.environment_url || github.event.inputs.url || 'https://coachpro-livid.vercel.app' }}
          # Credenciales rotadas: viven solo en GitHub Secrets (Settings → Secrets).
          QA_COACH_EMAIL: ${{ secrets.QA_COACH_EMAIL || 'coach@coachpro.app' }}
          QA_COACH_PASS: ${{ secrets.QA_COACH_PASS }}
          QA_TOKEN: ${{ secrets.QA_TOKEN }}
          # Bypass de Vercel Deployment Protection para previews (Settings → Deployment Protection → Protection Bypass for Automation).
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run qa

      - name: Subir capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots
          path: qa/screenshots/
          if-no-files-found: ignore
          retention-days: 14
